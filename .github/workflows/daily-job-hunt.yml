name: 🎯 Daily Job Hunter

on:
  # Runs every day at 9:00 AM IST (3:30 AM UTC)
  schedule:
    - cron: '30 3 * * *'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write # Allows committing history.json back to the repo

jobs:
  job-hunt:
    name: 🔍 Search & Email Jobs
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true # Ensures git pushes use the built-in token

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🎯 Run Job Hunter Agent
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          TWILIO_TO: ${{ secrets.TWILIO_TO }}
          TARGET_CITIES: 'Hyderabad,Bangalore,Pune'
          TARGET_ROLES: 'Frontend Developer,React Developer,Software Engineer,Full-Stack Developer,UI Engineer'
          CORE_SKILLS: 'React,Redux,JavaScript,NodeJS,HTML5,CSS3,REST APIs'
          MIN_SALARY_LPA: '10'
          MAX_SALARY_LPA: '20'
          EXPERIENCE_YEARS: '2'
        run: node index.js

      - name: 💾 Commit and Push Job History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json || true
          git commit -m "update sent jobs history database [skip ci]" || exit 0
          git push
